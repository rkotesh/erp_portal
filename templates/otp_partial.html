{% csrf_token %}
<div class="alert alert-info py-2 small text-center">
    ✅ OTP sent to your email. Check your terminal for the code (dev mode).
</div>
<h4 class="text-center mb-3">Security Verification</h4>
<p class="text-center text-muted small mb-4">
    Enter the 6-digit code to complete {{ purpose }}.
</p>

<input type="hidden" name="otp_step" value="verify">
<div class="mb-4">
    <input type="text" name="otp" id="otp-input" class="form-control text-center fw-bold"
        style="font-size: 1.5rem; letter-spacing: 0.5rem;" placeholder="000000" required maxlength="6" autofocus>
</div>
<button type="submit" class="btn btn-success w-100 py-2">Verify &amp; Access Dashboard</button>

<div class="mt-3 text-center">
    <small class="text-muted">Wrong page? <a
            href="{% if purpose == 'login' %}{% url 'login' %}{% else %}{% url 'register' %}{% endif %}">Start
            over</a></small>
</div>
