{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Access | CIET ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="{% static 'css/index.css' %}" rel="stylesheet">
    <style>
        body {
            background: transparent !important;
        }

        #vanta-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>

<body class="auth-wrapper">
    <div id="vanta-bg"></div>

    <div class="auth-card glass-panel text-center" data-aos="zoom-in">
        <div class="auth-header">
            <img src="{% static 'images/ciet_logo.svg' %}" class="auth-logo mx-auto mb-3"
                style="height: 100px; width: auto;">
            <h3 class="fw-bold text-maroon mb-1">RECOVER ACCESS</h3>
            <p class="text-muted smaller">Enter your institutional email to proceed</p>
        </div>

        <form method="post" class="text-start">
            {% csrf_token %}
            <div class="mb-4">
                <label class="smaller fw-bold text-muted mb-2 ms-1">Registered Email</label>
                <div class="position-relative">
                    <i class="bi bi-envelope position-absolute translate-middle-y top-50 ms-3 text-muted"></i>
                    <input type="email" name="email" class="input-glass ps-5" placeholder="name@ciet.edu.in" required
                        autofocus>
                </div>
            </div>

            <button type="submit" class="btn-ciet btn-ciet-primary w-100 justify-content-center py-3">
                Send Reset Link <i class="bi bi-send ms-2"></i>
            </button>

            <div class="text-center mt-4">
                <a href="{% url 'login' %}" class="smaller text-muted text-decoration-none hover-maroon">
                    <i class="bi bi-arrow-left me-1"></i> Return to Login
                </a>
            </div>
        </form>

        <div class="mt-5 pt-3 border-top opacity-50 smaller">
            &copy; 2026 CIET ERP Intelligence Unit
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
    <script>
        AOS.init();
        VANTA.FOG({
            el: "#vanta-bg",
            mouseControls: true, touchControls: true, gyroControls: false,
            highlightColor: 0x800000, midtoneColor: 0x2a5c8e, lowlightColor: 0xffffff,
            baseColor: 0xf8f9fa, blurFactor: 0.8, speed: 0.5
        });
    </script>
</body>

</html>
