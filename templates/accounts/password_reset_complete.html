{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credentials Updated | CIET ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="{% static 'css/index.css' %}" rel="stylesheet">
    <style>
        body {
            background: transparent !important;
        }

        #vanta-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>

<body class="auth-wrapper">
    <div id="vanta-bg"></div>

    <div class="auth-card glass-panel text-center" data-aos="zoom-in">
        <div class="glass-panel d-inline-flex p-3 mb-4" style="border-radius: 50%; background: rgba(25,135,84,0.05);">
            <i class="bi bi-check-circle-fill fs-1 text-success"></i>
        </div>

        <h3 class="fw-bold text-success mb-2">SECURITY READY</h3>
        <p class="text-muted smaller mb-4">
            Your credentials have been successfully synchronized. You may now proceed to authenticate.
        </p>

        <a href="{% url 'login' %}"
            class="btn-ciet btn-ciet-primary w-100 justify-content-center py-3 text-decoration-none">
            Authenticate Now <i class="bi bi-shield-lock ms-2"></i>
        </a>

        <div class="mt-5 pt-3 border-top opacity-50 smaller">
            &copy; 2026 CIET ERP Intelligence Unit
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
    <script>
        AOS.init();
        VANTA.FOG({
            el: "#vanta-bg",
            mouseControls: true, touchControls: true, gyroControls: false,
            highlightColor: 0x800000, midtoneColor: 0x2a5c8e, lowlightColor: 0xffffff,
            baseColor: 0xf8f9fa, blurFactor: 0.8, speed: 0.5
        });
    </script>
</body>

</html>
