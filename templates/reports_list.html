{% extends 'base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12 mb-4">
            <h1>Reports Archive</h1>
            <p class="text-muted">Access and share all generated automated reports.</p>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card p-4">
                <div hx-get="/api/v1/reports/list/" hx-trigger="load" hx-target="#all-reports-list">
                    <div id="all-reports-list">
                        <p class="text-muted">Loading reports archive...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('htmx:afterRequest', function (evt) {
        if (evt.detail.target.id === 'all-reports-list') {
            const data = JSON.parse(evt.detail.xhr.responseText);
            if (data.length === 0) {
                evt.detail.target.innerHTML = '<div class="text-center p-5"><p class="text-muted">No reports have been generated yet.</p></div>';
                return;
            }

            let html = '<div class="table-responsive"><table class="table">';
            html += '<thead><tr><th>Report Type</th><th>Format</th><th>Generated Date</th><th>Share Token</th><th>Action</th></tr></thead><tbody>';
            data.forEach(r => {
                html += `
                    <tr>
                        <td><strong>${r.type} Report</strong></td>
                        <td><span class="badge bg-secondary">${r.format}</span></td>
                        <td>${new Date(r.date).toLocaleString()}</td>
                        <td><code>${r.share_token.substring(0, 8)}...</code></td>
                        <td>
                            <a href="${r.url}" class="btn btn-sm btn-primary">Download</a>
                            <button class="btn btn-sm btn-outline-info" onclick="navigator.clipboard.writeText(window.location.origin + '/api/v1/reports/share/${r.share_token}/'); alert('Link copied!')">Share</button>
                        </td>
                    </tr>
                `;
            });
            html += '</tbody></table></div>';
            evt.detail.target.innerHTML = html;
        }
    });
</script>
{% endblock %}
